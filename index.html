<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza 360°</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* --- Preloader --- */
  #preloader {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #111;
    z-index: 100;
    transition: opacity 0.4s;
  }
  #preloader.hidden {
    opacity: 0;
    pointer-events: none;
  }
  #preloader-text {
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0.7;
  }
  #progress-bar-outer {
    width: 240px;
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-bar-inner {
    height: 100%;
    width: 0%;
    background: #fff;
    border-radius: 2px;
    transition: width 0.1s;
  }
  #progress-percent {
    margin-top: 12px;
    font-size: 13px;
    opacity: 0.5;
    font-variant-numeric: tabular-nums;
  }

  /* --- Viewer --- */
  #viewer {
    width: 100%;
    max-width: 900px;
    padding: 0 16px;
    opacity: 0;
    transition: opacity 0.5s;
    user-select: none;
    -webkit-user-select: none;
  }
  #viewer.visible { opacity: 1; }

  /* --- Switcher --- */
  #switcher {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .switch-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.5);
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .switch-btn:hover {
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.8);
  }
  .switch-btn.active {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.4);
    color: #fff;
  }

  #canvas {
    display: block;
    width: 100%;
    height: auto;
    cursor: grab;
    border-radius: 8px;
  }
  #canvas.grabbing { cursor: grabbing; }

  #hint {
    text-align: center;
    margin-top: 12px;
    font-size: 13px;
    opacity: 0.35;
    letter-spacing: 1px;
  }

  /* --- Progress bar --- */
  #viewer-progress {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 1px;
    margin-top: 10px;
    overflow: hidden;
  }
  #viewer-progress-inner {
    height: 100%;
    width: 0%;
    background: rgba(255,255,255,0.4);
    border-radius: 1px;
    transition: width 0.05s linear;
  }

  /* --- Rotate hint (mobile portrait) --- */
  #rotate-hint {
    display: none;
    text-align: center;
    margin-top: 16px;
    font-size: 12px;
    opacity: 0.4;
    letter-spacing: 0.5px;
  }
  #rotate-hint span {
    display: inline-block;
    font-size: 18px;
    animation: rotateIcon 2s ease-in-out infinite;
  }
  @keyframes rotateIcon {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(90deg); }
  }

  @media (max-width: 768px) and (orientation: portrait) {
    #rotate-hint { display: block; }
  }

  @media (max-width: 932px) and (orientation: landscape) {
    body { min-height: 100vh; min-height: 100dvh; }
    #viewer {
      max-width: 100%;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
    }
    #switcher {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      margin-bottom: 0;
    }
    .switch-btn {
      padding: 4px 14px;
      font-size: 12px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #canvas {
      border-radius: 0;
      width: auto;
      height: 100vh;
      height: 100dvh;
      object-fit: contain;
    }
    #hint { display: none; }
    #rotate-hint { display: none; }
  }
</style>
</head>
<body>

<div id="preloader">
  <div id="preloader-text">Loading 360°</div>
  <div id="progress-bar-outer">
    <div id="progress-bar-inner"></div>
  </div>
  <div id="progress-percent">0%</div>
</div>

<div id="viewer">
  <div id="switcher">
    <button class="switch-btn active" data-set="0">Pizza 1</button>
    <button class="switch-btn" data-set="1">Pizza 2</button>
  </div>
  <canvas id="canvas"></canvas>
  <div id="viewer-progress"><div id="viewer-progress-inner"></div></div>
  <div id="hint">drag to rotate</div>
  <div id="rotate-hint"><span>&#8635;</span> flip phone for fullscreen</div>
</div>

<script>
(function () {
  'use strict';

  // Build frame index map for set 2: skip frames around the junction (frame 240)
  // to avoid the static-looking transition
  const JUNCTION = 240;       // where pizza3-reverse ends and pizza2 begins
  const SKIP_HALF = 30;       // how many frames on each side to thin out
  const SKIP_STEP = 3;        // take every Nth frame in the skip zone

  const SET2_START = 60;      // first usable file index (0-based)
  const SET2_END   = 430;     // last usable file index (0-based)

  function buildSet2Map() {
    const map = [];
    for (let i = SET2_START; i <= SET2_END; i++) {
      const distFromJunction = Math.abs(i - JUNCTION);
      if (distFromJunction < SKIP_HALF) {
        if (distFromJunction % SKIP_STEP === 0) map.push(i);
      } else {
        map.push(i);
      }
    }
    return map;
  }
  const set2Map = buildSet2Map();

  const SETS = [
    { total: 480, path: (i) => `public/assets/frames2/frame_${String(i + 1).padStart(3, '0')}.webp`, frameMap: set2Map },
    { total: 240, path: (i) => `public/assets/frames/frame_${String(i + 1).padStart(3, '0')}.webp` },
  ];

  const FRAME_WIDTH  = 1280;
  const FRAME_HEIGHT = 720;
  const SENSITIVITY  = 1.2;
  const FRICTION     = 0.92;
  const MIN_VELOCITY = 0.3;

  const preloader   = document.getElementById('preloader');
  const progressBar = document.getElementById('progress-bar-inner');
  const progressPct = document.getElementById('progress-percent');
  const viewer      = document.getElementById('viewer');
  const canvas      = document.getElementById('canvas');
  const ctx         = canvas.getContext('2d');
  const buttons     = document.querySelectorAll('.switch-btn');

  // Load all sets (only mapped frames for sets with frameMap)
  function preloadAllSets() {
    let totalImages = 0;
    SETS.forEach(set => { totalImages += set.frameMap ? set.frameMap.length : set.total; });
    let loaded = 0;
    const allSets = SETS.map(() => []);

    return new Promise((resolve) => {
      function onProgress() {
        loaded++;
        const pct = Math.round((loaded / totalImages) * 100);
        progressBar.style.width = pct + '%';
        progressPct.textContent = pct + '%';
        if (loaded === totalImages) resolve(allSets);
      }

      SETS.forEach((set, si) => {
        const indices = set.frameMap || Array.from({ length: set.total }, (_, i) => i);
        allSets[si] = new Array(indices.length);
        indices.forEach((fileIdx, arrIdx) => {
          const img = new Image();
          img.onload  = () => { allSets[si][arrIdx] = img; onProgress(); };
          img.onerror = () => { allSets[si][arrIdx] = img; onProgress(); };
          img.src = set.path(fileIdx);
        });
      });
    });
  }

  async function init() {
    const allSets = await preloadAllSets();

    canvas.width  = FRAME_WIDTH;
    canvas.height = FRAME_HEIGHT;

    preloader.classList.add('hidden');
    viewer.classList.add('visible');

    const progressInner = document.getElementById('viewer-progress-inner');

    let activeSet     = 0;
    let frames        = allSets[activeSet];
    let currentFrame  = 0;
    let fractionalPos = 0;
    let velocity      = 0;
    let dragging      = false;
    let lastPointerX  = 0;
    let rafId         = null;
    const velSamples  = [];

    function pingPong(pos, len) {
      const cycle = len * 2;
      let mod = ((pos % cycle) + cycle) % cycle;
      if (mod < len) return mod;
      return cycle - mod - 1;
    }

    function loopWrap(pos, len) {
      return ((pos % len) + len) % len;
    }

    function isLoop() { return !!SETS[activeSet].loop; }

    function drawFrame(virtualPos) {
      const len = frames.length;
      const idx = Math.round(isLoop() ? loopWrap(virtualPos, len) : pingPong(virtualPos, len));
      currentFrame = Math.max(0, Math.min(len - 1, idx));
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(frames[currentFrame], 0, 0, canvas.width, canvas.height);
      const pct = (currentFrame / (len - 1)) * 100;
      progressInner.style.width = pct + '%';
    }

    function switchSet(idx) {
      if (idx === activeSet) return;
      activeSet = idx;
      frames = allSets[activeSet];
      fractionalPos = 0;
      velocity = 0;
      cancelInertia();
      drawFrame(0);
      buttons.forEach((b, i) => b.classList.toggle('active', i === idx));
    }

    buttons.forEach((btn) => {
      btn.addEventListener('click', () => switchSet(Number(btn.dataset.set)));
    });

    drawFrame(0);

    // --- Pointer handlers ---
    function onPointerDown(e) {
      if (e.button && e.button !== 0) return;
      dragging = true;
      velocity = 0;
      cancelInertia();
      lastPointerX = e.clientX;
      velSamples.length = 0;
      canvas.classList.add('grabbing');
      canvas.setPointerCapture(e.pointerId);
    }

    function onPointerMove(e) {
      if (!dragging) return;
      const dx = e.clientX - lastPointerX;
      lastPointerX = e.clientX;

      const displayWidth = canvas.getBoundingClientRect().width;
      const pxPerFrame = (displayWidth / frames.length) * SENSITIVITY;
      const frameDelta = dx / Math.max(pxPerFrame, 0.1);

      fractionalPos -= frameDelta;
      drawFrame(fractionalPos);

      velSamples.push({ dx: -frameDelta, t: performance.now() });
      if (velSamples.length > 5) velSamples.shift();
    }

    function onPointerUp() {
      if (!dragging) return;
      dragging = false;
      canvas.classList.remove('grabbing');
      velocity = computeReleaseVelocity();
      if (Math.abs(velocity) > MIN_VELOCITY) startInertia();
    }

    function computeReleaseVelocity() {
      if (velSamples.length < 2) return 0;
      const now = performance.now();
      const recent = velSamples.filter(s => now - s.t < 100);
      if (recent.length < 2) return 0;
      const totalDx = recent.reduce((sum, s) => sum + s.dx, 0);
      const dt = recent[recent.length - 1].t - recent[0].t;
      if (dt === 0) return 0;
      return (totalDx / dt) * 16;
    }

    function startInertia() {
      cancelInertia();
      function step() {
        velocity *= FRICTION;
        if (Math.abs(velocity) < MIN_VELOCITY) { velocity = 0; return; }
        fractionalPos += velocity;
        drawFrame(fractionalPos);
        rafId = requestAnimationFrame(step);
      }
      rafId = requestAnimationFrame(step);
    }

    function cancelInertia() {
      if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
    }

    canvas.addEventListener('pointerdown', onPointerDown);
    canvas.addEventListener('pointermove', onPointerMove);
    canvas.addEventListener('pointerup', onPointerUp);
    canvas.addEventListener('pointercancel', onPointerUp);
    canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
    canvas.addEventListener('contextmenu', e => e.preventDefault());
  }

  init();
})();
</script>
</body>
</html>
